# UIAO Canon Specification Data
# Source: 01_Canon/UIAO-Main-Spec-v1.md
# Captures data not already in program.yml, control-planes.yml, or roadmap.yml

canon_spec:
  version: "1.0"
  date: "2026-03"
  classification: Public
  source: UIAO-Main-Spec-v1.md

audience_guide:
  - role: CIO / CISO / Executive
    sections: "1-5"
    note: Full business case
  - role: Enterprise Architect
    sections: "1-8"
    appendices: [A, C, E, F]
    note: Mandates, canon, Source of Authority, core object architectures
  - role: Implementation Engineer
    sections: "7-11"
    appendices: [G, H, J]
    note: Layered architecture, playbooks, pilot plan
  - role: Program Manager
    sections: "1-5, 11-12"
    appendices: [H, I]
    note: Roadmap, governance
  - role: Compliance / Legal
    sections: "3-4"
    appendices: [C]
    note: Mandate crosswalk

core_thesis: >-
  The federal government is structurally frozen at the Client/Server
  L2-L4 perimeter era. Identity-forward modernization where identity
  becomes the root namespace and primary security perimeter is the
  only path forward.

why_patching_fails:
  - id: inverted-identity
    frozen: Identity as gate (authenticate once)
    required: Identity as continuous signal
  - id: backwards-trust
    frozen: Inside equals trusted
    required: Trust nothing, verify everything
  - id: disconnected-telemetry
    frozen: Siloed logs
    required: Conversation-level correlation across all signals
  - id: manual-governance
    frozen: Human review cycles
    required: Automated continuous enforcement at machine speed
  - id: no-data-control-plane
    frozen: Data protected by perimeter
    required: Data-level controls that travel with data

canon_17_point:
  description: >-
    Diagnostic framework and architectural spine explaining why federal
    IT is structurally frozen and what must change
  tiers:
    - id: tier-1
      name: Historical Foundations
      scope: >-
        History of compute, networking, and cybersecurity;
        where federal environments are frozen
    - id: tier-2
      name: Structural Constraints
      scope: >-
        Federal freeze points, bureaucratic overlays, funding model
        mismatches, and L2-L4 vs L5-L7 gaps
    - id: tier-3
      name: Modern Requirements
      scope: >-
        Telemetry and location as mandatory inputs, new control planes,
        source-of-truth crisis, AI for correlation, inter-agency truth
        fabric, data as perimeter, and outdated risk models
  core_conditions:
    - Visibility
    - Verification
    - Validation
    - Control

source_of_authority:
  description: >-
    Explicit definitions of who may create, modify, and revoke data
    and under what conditions
  domains:
    - id: human-identity
      authority: HR
      target: Identity system
    - id: non-person-entities
      authority: Service owners
      target: Identity and asset systems
    - id: contractor-identity
      authority: Contracting authority
      target: Identity system
    - id: citizen-identity
      authority: Citizen
      target: Federated identity providers
    - id: ip-addressing
      authority: Network architecture
      target: IPAM
    - id: assets-configuration
      authority: System owners
      target: CMDB
    - id: data-classification
      authority: Data owners
      target: Policy engines
    - id: physical-location
      authority: Real property and space management
      target: Addressing
    - id: partner-authority
      authority: Shared or delegated authorities
      target: Federation
    - id: credential-trust
      authority: Federal PKI and trust frameworks
      target: Certificate authorities

runtime_model:
  description: >-
    At runtime UIAO operates on conversations as the atomic unit
  conversation_flow:
    - step: 1
      action: Conversation initiated by identity (human or NPE)
    - step: 2
      action: Addressing and boundaries selected based on identity attributes and policy
    - step: 3
      action: Certificates and overlays establish authenticated paths
    - step: 4
      action: Telemetry streams bound to conversation for quality, security, and audit
    - step: 5
      action: Policy evaluations occur continuously as telemetry and assurance change
  determinism: >-
    Given the same identity, boundary, telemetry, and assurance inputs,
    the system produces the same decision across clouds, agencies,
    and implementations

federal_identity_fragmentation:
  description: >-
    The US operates multiple disconnected identity regimes that do
    not interoperate in a coherent enterprise architecture
  regimes:
    - Workforce smartcards
    - Citizen digital identity
    - Passports
    - REAL ID
  consequences:
    - No cross-regime lifecycle management
    - No shared identity graph
    - No technical interoperability across channels or missions
  uiao_role: >-
    Unified identity graph as reconciliation layer that federates
    and correlates regimes while preserving legal and assurance properties

compliance_drivers:
  - Zero Trust strategy requirements (OMB memoranda)
  - Advanced logging and telemetry requirements
  - Binding Operational Directives for identity, asset, and vulnerability practices
  - Civil cyber-fraud enforcement for misrepresented compliance
  - Modernized FISMA reporting and emergency directive powers

cost_of_inaction:
  - Budget impact
  - Emergency directives
  - Negative audit findings
  - Legal risk
  - Mission disruption
  - Inability to integrate with state and federal partners
