# UIAO Style Guide - Machine-Readable Governance Rules
# Version: 1.1
# Date: 2026-04-03
# Human-readable reference: docs/STYLE-GUIDE.qmd
# Referenced by: CI validation, canon-spec.yml, CONTRIBUTING.md

style_guide:
  version: "1.1"
  status: "active"
  date: "2026-04-03"
  human_reference: "docs/STYLE-GUIDE.qmd"

  # --- Section 1B: Core Principles (Canon Style Guide) ---
  core_principles:
    - id: "CP-CANON-001"
      name: "Canonical Numbering"
      rule: "Article X → Section X.Y → Subsection X.Y.Z"
    - id: "CP-CANON-002"
      name: "Deterministic Output"
      rule: "No drift, no ambiguity, no version references"
    - id: "CP-CANON-003"
      name: "Claims-Not-Copies"
      rule: "All data is referenced, not duplicated"
    - id: "CP-CANON-004"
      name: "Provenance-First"
      rule: "Every statement traceable to a source"
    - id: "CP-CANON-005"
      name: "Governance-Integrated"
      rule: "FIMF, risk registers, controls, KPIs"
    - id: "CP-CANON-006"
      name: "Adapter-First"
      rule: "All systems described through adapter contracts"

  # --- Section 2: Voice and Tone ---
  voice:
    attributes:
      - "authoritative"
      - "clear_and_declarative"
      - "technically_precise"
      - "narrative_not_academic"
      - "zero_hype"
      - "zero_ambiguity"
    prohibited:
      - "marketing_language"
      - "casual_phrasing"
      - "speculative_claims"
      - "vendor_hype"
      - "thought_leadership_fluff"

  # --- Section 3: Canonical Section Order ---
  canonical_section_order:
    - id: 1
      name: "Title"
      required: true
    - id: 2
      name: "Version + Date"
      required: true
    - id: 3
      name: "Purpose"
      required: true
    - id: 4
      name: "Scope"
      required: true
    - id: 5
      name: "Control Plane Alignment"
      required: true
    - id: 6
      name: "Core Concepts"
# Single Source of Truth (SSOT): README.md is the authoritative origin
      required: true
    - id: 7
      name: "Architecture Model"
      required: false
      condition: "Include when document describes system architecture"
    - id: 8
      name: "Runtime Model"
      required: false
      condition: "Include when document describes operational behavior"
    - id: 9
      name: "Compliance Mapping"
      required: true
    - id: 10
      name: "Dependencies and Sequencing"
      required: true
    - id: 11
      name: "Governance and Drift Controls"
      required: true
    - id: 12
      name: "Appendices"
      required: false
      condition: "As needed"

  # --- Section 4: Frozen Definitions ---
  frozen_definitions:
    control_planes:
      - id: "CP-1"
        name: "Identity Control Plane"
      - id: "CP-2"
        name: "Network Control Plane"
      - id: "CP-3"
        name: "Addressing Control Plane"
      - id: "CP-4"
        name: "Telemetry and Location Control Plane"
      - id: "CP-5"
        name: "Security and Compliance Plane"
      - id: "CP-6"
        name: "Management Plane (ServiceNow + Intune)"

    core_concepts:
      - id: "CC-1"
        name: "Conversation as the atomic unit"
      - id: "CC-2"
        name: "Identity as the root namespace"
      - id: "CC-3"
        name: "Deterministic addressing"
      - id: "CC-4"
        name: "Certificate-anchored overlay"
      - id: "CC-5"
        name: "Telemetry as control"
      - id: "CC-6"
        name: "Embedded governance and automation"
      - id: "CC-7"
        name: "Public service first"

    runtime_model:
      - step: 1
        action: "Identity initiates"
      - step: 2
        action: "Addressing binds"
      - step: 3
        action: "Certificates authenticate"
      - step: 4
        action: "Telemetry informs"
      - step: 5
        action: "Policy evaluates continuously"

    determinism: >-
      Given the same identity, boundary, telemetry, and assurance inputs,
      the system must produce the same decision across clouds, agencies,
      and implementations.

  # --- Section 5: Formatting Rules ---
  formatting:
    headings:
      h1: "Document title only"
      h2: "Major sections"
      h3: "Subsections"
      h4: "Deep technical detail only"
    tables:
      rules:
        - "No merged cells"
        - "No decorative formatting"
        - "Standard Markdown pipe format"
    lists:
      rules:
        - "Numbered lists for sequences"
        - "Bullet lists for concepts"
        - "Never mix bullets and numbers in same list"
    code:
      rules:
        - "Always use fenced code blocks with language identifier"
        - "Never inline large YAML or JSON"
    diagrams:
      png_path: "docs/images/"
      drawio_path: "assets/"
      rule: "Never embed diagrams directly in prose without a file reference"
      background: "#FFFFFF"
      id_format: "Image X-YY"
      required_metadata:
        - "unique_id"
        - "dimensions"
        - "generator_ready_description"
      rendering:
        primary: "PlantUML (server-rendered PNG)"
        secondary: "Gemini AI (static infographic PNG)"
        prohibited: "PlantUML (deprecated in uiao-docs)"

  # --- Section 6: Crosswalk Rules ---
  crosswalk:
    single_source_of_truth:
      - "data/crosswalk-index.yml"
      - "data/nist_crosswalk.yml"
      - "data/ksi-mappings.yml"
    language_pattern: >-
      Mapped to NIST 800-53 Rev 5 control [CONTROL-ID] via [mechanism]
      and [enforcement method].

  # --- Section 7: Compliance Language ---
  compliance:
    fedramp:
      required_fields:
        - "baseline"
        - "fedramp_20x_class"
        - "evidence_source"
    nist:
      required_fields:
        - "control_id"
        - "control_name"
        - "revision_number"
      citation_format: "Aligned to [CONTROL-ID]: [Control Name] (NIST SP 800-53 Rev 5)."
    oscal:
      required_fields:
        - "export_format"
        - "source_file"
        - "generating_pipeline"

  # --- Section 8: Governance and Drift ---
  governance:
    required_metadata:
      - field: "source_of_authority"
        description: "Which data file or canon volume governs this content"
      - field: "drift_detection"
        description: "How deviations from canonical definition are detected"
      - field: "remediation_workflow"
        description: "How drift is corrected"
      - field: "telemetry_validation"
        description: "Which monitoring source confirms runtime compliance"

  # --- Section 9: Interdependency ---
  interdependency:
    required_declarations:
      - "control_planes"
      - "crosswalk_entries"
      - "diagrams"
      - "appendices"

  # --- Section 10: File Naming ---
  file_naming:
    control_narratives: "{CONTROL-ID}.yml"
    architecture_docs: "snake_case_v{VERSION}.md"
    data_files: "snake_case.yml"
    diagrams: "kebab-case.png"
    leadership_briefings: "leadership_briefing_v{VERSION}.md"

  # --- Section 11: Version Control ---
  version_control:
    commit_prefixes:
      - "feat:"
      - "fix:"
      - "docs:"
      - "chore:"
      - "style:"
    frozen_definition_changes: "Require ADR in docs/adr/"
    minor_version_trigger: "Style guide rule updates"
    major_version_trigger: "Canonical section order changes"

  # --- Section 12: Enforcement ---
  enforcement:
    mechanisms:
      - type: "ci_validation"
        description: "GitHub Actions structural checks"
      - type: "manual_review"
        description: "Pull request approval"
      - type: "machine_rules"
        description: "This file (data/style-guide.yml)"
      - type: "periodic_audit"
        description: "Full document corpus review"
    non_compliance: "Documents flagged as non-canonical; remediation required before FedRAMP/OSCAL export"

  # --- Section 13: Security & Cloud Rules ---
  security_and_cloud:
    default_cloud: "Commercial Cloud"
    exceptions:
      - service: "Amazon Connect Contact Center"
        cloud: "AWS Commercial (not GovCloud)"
        reason: "Explicit architectural exception"
    gcc_moderate_scope: "M365 SaaS only — does not apply to Azure IaaS/PaaS"
    fedramp_high: false
    fedramp_high_note: "UIAO Canon rule: We are not FedRAMP High"
    ai_leakage:
      status: "core_security_risk"
      description: "AI data leakage is a recognized core security risk in UIAO"

  # --- Section 14: No-Hallucination Protocol ---
  no_hallucination_protocol:
    rules:
      - "Use only user-provided text"
      - "Mark MISSING for absent data"
      - "Mark UNSURE for uncertain data"
      - "Mark NEW (Proposed) for suggested additions"
    micro_steps:
      - "List"
      - "Group"
      - "Identify gaps"
      - "Propose"
      - "Generate"
    validation: "Validate against source of truth before finalizing"
