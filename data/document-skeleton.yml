# UIAO Canonical Document Skeleton — Machine-Readable Definition v1.0
# Source: docs/DOCUMENT-SKELETON.md
# Template: templates/canonical-skeleton.md.j2

document_skeleton:
  version: "1.0"
  status: "active"
  date: "2025-06-14"
  human_reference: "docs/DOCUMENT-SKELETON.md"
  template: "templates/canonical-skeleton.md.j2"
  style_guide: "data/style-guide.yml"

  sections:
    - number: 1
      id: "title_page"
      name: "Title Page"
      required: true
      fields:
        - name: "title"
          type: "string"
          required: true
        - name: "subtitle"
          type: "string"
          required: false
        - name: "version"
          type: "string"
          required: true
          format: "semver"
        - name: "date"
          type: "string"
          required: true
          format: "YYYY-MM-DD"
        - name: "classification"
          type: "string"
          required: true
          default: "Public"
          allowed_values:
            - "Public"
        - name: "source_planes"
          type: "list"
          required: true
          allowed_values:
            - "Identity"
            - "Policy"
            - "Data"
            - "Network"
            - "Compute"
            - "Monitoring"
        - name: "document_type"
          type: "string"
          required: true
          allowed_values:
            - "Architecture"
            - "Narrative"
            - "Compliance"
            - "Executive"
            - "Crosswalk"
            - "Appendix"
            - "Governance"

    - number: 2
      id: "purpose"
      name: "Purpose"
      required: true
      description: "Why the document exists, its architectural or governance function, and its intended audience."

    - number: 3
      id: "scope"
      name: "Scope"
      required: true
      subsections:
        - id: "included"
          name: "Included"
          type: "list"
          required: true
        - id: "excluded"
          name: "Excluded"
          type: "list"
          required: true
        - id: "boundaries_and_assumptions"
          name: "Boundaries and Assumptions"
          type: "list"
          required: false
        - id: "dependencies"
          name: "Dependencies"
          type: "list"
          required: false

    - number: 4
      id: "control_plane_alignment"
      name: "Control Plane Alignment"
      required: true
      description: "Declare which of the six control planes this document addresses."
      table_schema:
        columns:
          - name: "Control Plane"
            source: "control_planes"
          - name: "Role"
            allowed_values:
              - "Primary"
              - "Dependent"
              - "Referenced"
              - "Consumes signals"
              - "Cross-cutting"
              - "Governance integration"
              - "Not Applicable"

    - number: 5
      id: "core_concepts"
# Single Source of Truth (SSOT): README.md is the authoritative origin
      name: "Core Concepts"
      required: true
      description: "Must reference the Eight Core Concepts. Only relevant concepts are expanded in detail."
      core_concepts:
      - "Single Source of Truth (SSOT)"
      - "Conversation as the Atomic Unit"
      - "Identity as the Root Namespace"
      - "Deterministic Addressing"
      - "Certificate-Anchored Overlay"
      - "Telemetry as Control"
      - "Embedded Governance and Automation"
      - "Public Service First"

    - number: 6
      id: "architecture_model"
      name: "Architecture Model"
      required: true
      subsections:
        - id: "overview"
          name: "Overview"
          required: true
        - id: "diagrams"
          name: "Diagrams"
          required: false
          item_schema:
            - "filename"
            - "description"
        - id: "components"
          name: "Component Definitions"
          required: false
          item_schema:
            - "name"
            - "description"
        - id: "data_flows"
          name: "Data Flows"
          required: false
        - id: "integration_points"
          name: "Integration Points"
          required: false

    - number: 7
      id: "runtime_model"
      name: "Runtime Model"
      required: true
      subsections:
        - id: "conversation_flow"
          name: "Conversation Flow"
          required: true
        - id: "deterministic_decisioning"
          name: "Deterministic Decisioning"
          required: true
        - id: "continuous_evaluation"
          name: "Continuous Evaluation"
          required: true
        - id: "assurance_signals"
          name: "Assurance Signals"
          required: false
          item_schema:
            - "name"
            - "description"

    - number: 8
      id: "compliance_mapping"
      name: "Compliance Mapping"
      required: true
      table_schema:
        columns:
          - name: "Framework"
          - name: "Control ID"
          - name: "Control Name"
          - name: "Evidence Source"
      subsections:
        - id: "ksi_categories"
          name: "KSI Categories"
          required: false

    - number: 9
      id: "dependencies_sequencing"
      name: "Dependencies & Sequencing"
      required: true
      subsections:
        - id: "upstream"
          name: "Upstream Dependencies"
          type: "list"
          required: true
        - id: "downstream"
          name: "Downstream Dependencies"
          type: "list"
          required: true
        - id: "timeline_references"
          name: "Modernization Timeline References"
          type: "list"
          required: false

    - number: 10
      id: "governance_drift"
      name: "Governance & Drift Controls"
      required: true
      fields:
        - name: "source_of_authority"
          required: true
        - name: "drift_detection"
          required: true
        - name: "remediation_workflow"
          required: true
        - name: "audit_anchors"
          required: true

    - number: 11
      id: "appendices"
      name: "Appendices"
      required: false
      ordered_slots:
        - letter: "A"
          title: "Control Crosswalk"
        - letter: "B"
          title: "Glossary of Terms"
        - letter: "C"
          title: "Diagram Index"
        - letter: "D"
          title: "Evidence Source Catalog"
        - letter: "E"
          title: "Dependency Map"
        - letter: "F"
          title: "KSI Summary"
        - letter: "G"
          title: "Revision Notes"
        - letter: "H"
          title: "Related Documents"
      rules:
        - "No appendix may redefine anything in the core document."
        - "Appendix order A-H is fixed."

    - number: 12
      id: "revision_history"
      name: "Revision History"
      required: true
      table_schema:
        columns:
          - name: "Version"
          - name: "Date"
          - name: "Author"
          - name: "Summary of Changes"

  control_planes:
    - id: "identity"
      name: "Identity"
    - id: "policy"
      name: "Policy"
    - id: "data"
      name: "Data"
    - id: "network"
      name: "Network"
    - id: "compute"
      name: "Compute"
    - id: "monitoring"
      name: "Monitoring"

  # --- Document Variants ---
  variants:
    - id: "technical_specification"
      name: "Technical Specification Template"
      description: "Specialization for Adapter Contracts, Governance Specs, and Layer Definitions"
      document_id_format: "UIAO_[SYSTEM]_SPEC_[VERSION]"
      human_reference: "docs/governance/technical-spec-template.qmd"
      additional_sections:
        - number: 3.5
          id: "definitions"
          name: "Definitions"
          required: true
          description: "Term-definition pairs for all domain-specific terminology"
        - number: 5
          id: "contract_requirements"
          name: "Contract Requirements"
          required: true
          requirement_language: "MUST / SHOULD / MAY (RFC 2119)"
          subsections:
            - id: "inputs"
              name: "Inputs"
              required: true
            - id: "outputs"
              name: "Outputs"
              required: true
            - id: "error_conditions"
              name: "Error Conditions"
              required: true
            - id: "logging_telemetry"
              name: "Logging & Telemetry"
              required: true
            - id: "security_controls"
              name: "Security Controls"
              required: true
        - number: 7
          id: "operational_requirements"
          name: "Operational Requirements"
          required: true
          subsections:
            - id: "performance"
              name: "Performance"
            - id: "availability"
              name: "Availability"
            - id: "determinism"
              name: "Determinism"
            - id: "drift_controls"
              name: "Drift Controls"
            - id: "deployment_boundaries"
              name: "Deployment Boundaries"
      appendix_overrides:
        - letter: "A"
          title: "Image Descriptions"
        - letter: "B"
          title: "Copy Section"
        - letter: "C"
          title: "Change Log (no references to prior versions)"

  enforcement:
    validation: "CI schema check against this file"
    manual_review: "Architecture review board"
    drift_detection: "Automated section-order and field-presence checks"
