# UIAO Program Data - Single Source of Truth
# All documents generated from this structured data

program:
  name: Unified Identity-Addressing-Overlay Architecture
  acronym: UIAO
  version: "1.0"
  date: March 2026
  classification: Public

vision:
  statement: >-
    A fully modernized, identity-driven, cloud-optimized,
    telemetry-rich federal network
  strategic_goal: >-
    Transform the agency into a cloud-optimized, identity-driven,
    telemetry-informed, Zero Trust-aligned, TIC 3.0-compliant
    federal enterprise
  design_principle: >-
    If it degrades the citizen interaction, it does not ship

technologies:
  - id: entra-id
    name: Microsoft Entra ID
    role: Identity control plane
    domain: identity
  - id: icam
    name: ICAM (NIST 800-63, OMB M-19-17)
    role: Governance backbone
    domain: identity
  - id: infoblox
    name: InfoBlox IPAM
    role: Authoritative IPAM
    domain: addressing
  - id: cisco-sdwan
    name: Cisco Catalyst SD-WAN
    role: Routing control plane
    domain: network
  - id: cloud-telemetry
    name: Cloud Telemetry + Location Services
    role: Telemetry and location
    domain: telemetry
  - id: tic3
    name: TIC 3.0 Cloud + Branch
    role: Security and compliance
    domain: compliance

control_planes:
  - id: identity
    name: Identity Control Plane
    components:
      - Entra ID
      - ICAM governance
      - Conditional Access
      - PIM
      - Lifecycle automation
  - id: network
    name: Network Control Plane
    components:
      - Cisco Catalyst SD-WAN
      - Cloud OnRamp for M365
      - INR integration
      - Zero Trust segmentation
  - id: addressing
    name: Addressing Control Plane
    components:
      - InfoBlox IPAM
      - DNS/DHCP modernization
      - Cloud IPAM reconciliation
  - id: telemetry
    name: Telemetry and Location Control Plane
    components:
      - M365 Network Telemetry
      - SD-WAN telemetry (IPFIX/SNMP/syslog)
      - Endpoint telemetry (Defender/Intune)
      - DNS telemetry (InfoBlox)
      - CDM/CLAW reporting
      - SIEM ingestion
  - id: compliance
    name: Security and Compliance Plane
    components:
      - TIC 3.0 Cloud + Branch
      - Zero Trust
      - FedRAMP alignment
      - NIST 800-63
      - ICAM governance

core_concepts:
  - id: conversation
    name: Conversation as atomic unit
    description: >-
      Every interaction is a conversation with identity, certificates,
      addressing, path, QoS, and telemetry bound together
  - id: identity-namespace
    name: Identity as root namespace
    description: >-
      Every IP, certificate, subnet, policy, and telemetry event is
      derived from or bound to identity
  - id: deterministic-addressing
    name: Deterministic addressing
    description: >-
      Addressing is derived from identity attributes and policy,
      not ad-hoc assignment
  - id: cert-overlay
    name: Certificate-anchored overlay
    description: >-
      Certificates and mutual TLS anchor tunnel and service
      authentication
  - id: telemetry-control
    name: Telemetry as control
    description: >-
      Telemetry is a control plane input to automated decisions,
      not passive reporting
  - id: embedded-governance
    name: Embedded governance and automation
    description: >-
      Governance is executed through orchestrated workflows,
      not manual tickets
  - id: public-first
    name: Public service first
    description: >-
      Citizen experience, accessibility, and privacy are
      top-level design constraints

guiding_principles:
  - Zero Trust by default
  - Identity as the new perimeter
  - Telemetry as the truth source
  - Cloud-first routing
  - Incremental modernization (no big-bang)
  - FedRAMP-aligned controls
  - Modular, extensible architecture

frozen_state_domains:
  - id: identity
    current: On-prem Active Directory, siloed per division
    gap: No unified identity graph
  - id: addressing
    current: Static IP managed in spreadsheets
    gap: No identity-to-address binding
  - id: network-security
    current: Perimeter firewalls (L3/L4)
    gap: No identity-aware segmentation
  - id: endpoint
    current: Mixed tooling
    gap: No unified posture signal
  - id: app-delivery
    current: Monolithic apps, local auth per app
    gap: No workload identity
  - id: telemetry
    current: SIEM collects logs but no correlation
    gap: No conversation-level correlation
  - id: governance
    current: Change management by email and tickets
    gap: No automated policy enforcement
  - id: data-protection
    current: Manual classification, noisy DLP
    gap: No data-aware routing

current_challenges:
  - TIC 2.0 hairpin bottlenecks
  - AD-centric identity with limited governance
  - Fragmented IPAM across cloud and on-prem
  - Limited telemetry visibility
  - No INR or E911 readiness
  - Inconsistent Zero Trust enforcement

mission_impact:
  - Poor M365 performance
  - Increased cyber risk
  - Compliance gaps
  - Operational inefficiencies

program_outcomes:
  - Reduced latency and improved M365 performance
  - Stronger identity governance and compliance
  - Accurate addressing and location inference
  - Real-time telemetry for routing and security
  - TIC 3.0 compliance across cloud and branch
  - A unified, future-proof modernization foundation
fedramp_20x_alignment:
  mandate: "M-24-15 & FedRAMP Authorization Act"
  core_shift: "Narrative-based compliance to Telemetry-based validation"
  framework_version: "2026.1 (Consolidated Rules)"
  fedramp_data_file: "data/fedramp-20x.yml"
  crosswalk_template: "templates/fedramp-crosswalk.md.j2"
  key_requirements:
    - id: KSI-001
      name: "Automated Evidence Generation"
      target: "80% of controls via OSCAL"
    - id: SCN-001
      name: "Significant Change Notification"
      benefit: "Eliminates SCR bottleneck for continuous innovation"
    - id: SEC-INBOX
      name: "Government Security Inbox"
      requirement: "Dedicated automated channel for vulnerability directives"
  compliance_status: "In Progress - UIAO architecture is 20x-aligned by design"

  core_stack:
