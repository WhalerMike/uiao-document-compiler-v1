# Quarto Frontmatter Mapping for UIAO Documents
# Maps document keys (derived from filenames) to Quarto YAML frontmatter.
# Key derivation: filename.md -> remove _vX.Y suffix -> replace _ with - -> lowercase
# Example: executive_summary_v1.0.md -> executive-summary

documents:
  executive-summary:
    title: "UIAO Executive Summary"
    subtitle: "Unified Identity & Access Operations"
    formats: [html, docx, pdf, pptx, gfm]
    classification: "Public"

  leadership-briefing:
