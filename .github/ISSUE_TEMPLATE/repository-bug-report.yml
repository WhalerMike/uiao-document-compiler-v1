# <!-- NEW (Proposed) -->
name: Repository Bug Report
description: Report issues with the repository structure, links, or formatting.
title: "[Bug] <Short Description>"
labels: ["bug"]
body:
  - type: textarea
    id: issue
    attributes:
      label: Describe the issue
      description: What is broken or incorrect?
      placeholder: |
        File: ...
        Issue: ...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can someone observe this issue?
      placeholder: |
        1. Navigate to ...
        2. Click on ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen instead?
      placeholder: Describe the correct behavior or output.
