# <!-- NEW (Proposed) -->
name: Governance Drift Report
description: Report drift in identity, addressing, configuration, or telemetry.
title: "[Drift] <Domain>: <Short Description>"
labels: ["drift", "governance"]
body:
  - type: dropdown
    id: domain
    attributes:
      label: Drift Domain
      options:
        - Identity
        - Addressing
        - Network
        - Telemetry
        - Certificates
        - CMDB
    validations:
      required: true
  - type: textarea
    id: symptoms
    attributes:
      label: Drift Symptoms
      description: Describe what is out of alignment.
      placeholder: |
        Observed state: ...
        Detection method: ...
        Date detected: ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected State
      description: Describe the canonical expected state.
      placeholder: Reference the canon document and section that defines the expected state.
    validations:
      required: true
  - type: textarea
    id: remediation
    attributes:
      label: Proposed Remediation
      description: Describe how to restore alignment.
      placeholder: |
        Remediation steps: ...
        Estimated effort: ...
        Automation potential: ...
