# <!-- NEW (Proposed) -->
name: Documentation Update
description: Request updates to non-canonical documentation.
title: "[Docs] <Short Description>"
labels: ["documentation"]
body:
  - type: textarea
    id: update
    attributes:
      label: Describe the update
      description: What content needs to be added, changed, or removed?
      placeholder: |
        Current state: ...
        Desired state: ...
    validations:
      required: true
  - type: textarea
    id: location
    attributes:
      label: File or directory
      description: Which file(s) or directory does this affect?
      placeholder: e.g., docs/STYLE-GUIDE.md, README.md
    validations:
      required: true
  - type: textarea
    id: justification
    attributes:
      label: Why is this update needed?
      description: Explain the reason for this documentation change.
      placeholder: Reference any canon documents, issues, or PRs that motivate this change.
