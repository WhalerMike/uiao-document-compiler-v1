# Drift Detection Workflow
# Detects canonical drift across the UIAO repository.
# Runs weekly on Monday, on push to docs/canon, and on manual dispatch.
# When drift is found, can auto-fix and create a GitHub Issue.
name: Drift Detection

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 06:00 UTC
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'canon/**'
      - 'README.md'
      - 'templates/**'
      - 'adapters/**'
  workflow_dispatch:
    inputs:
      auto_fix:
        description: 'Automatically fix detected drift and commit'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write
  issues: write

jobs:
  detect-drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run drift detection
        id: drift
        run: |
          python scripts/detect_drift.py --verbose --output reports/drift-report.json
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload drift report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: reports/drift-report.json
          retention-days: 30

      - name: Auto-fix drift
        if: >
          steps.drift.outcome == 'failure' &&
          (github.event.inputs.auto_fix == 'true' || github.event_name == 'schedule')
        id: fix
        continue-on-error: true
        run: |
          python scripts/detect_drift.py --fix --verbose --output reports/drift-report-post-fix.json || true
                    python scripts/fix_concept_lists.py --fix --verbose
                              python scripts/add_ssot_concept.py --fix --verbose

      - name: Commit auto-fix changes
        if: steps.fix.outcome != 'skipped'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit after fix."
          else
            git commit -m "fix: auto-remediate canonical drift detected by drift-detection workflow"
                        git pull --rebase origin main
            git push
          fi

      - name: Create GitHub Issue for drift
        if: steps.drift.outcome == 'failure' && github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('reports/drift-report.json', 'utf8'));

            const filesWithDrift = report.summary.files_with_drift || [];
            const criticalCount = report.critical_count || 0;
            const warningCount = report.warning_count || 0;

            let body = `## Canon Drift Detected\n\n`;
            body += `**Generated:** ${report.generated_at}\n`;
            body += `**Files scanned:** ${report.files_scanned}\n`;
            body += `**Critical findings:** ${criticalCount}\n`;
            body += `**Warning findings:** ${warningCount}\n\n`;

            if (filesWithDrift.length > 0) {
              body += `### Files with drift\n\n`;
              for (const f of filesWithDrift) {
                body += `- \`${f}\`\n`;
              }
              body += `\n`;
            }

            body += `### Category breakdown\n\n`;
            for (const [cat, count] of Object.entries(report.summary.categories || {})) {
              body += `- **${cat}:** ${count}\n`;
            }

            body += `\n### Findings detail\n\n`;
            for (const finding of (report.findings || []).slice(0, 20)) {
              const loc = finding.line > 0 ? `${finding.file}:${finding.line}` : finding.file;
              body += `- **[${finding.severity.toUpperCase()}]** \`${loc}\`: ${finding.description}\n`;
              if (finding.matched_text) {
                body += `  - Found: \`${finding.matched_text}\`\n`;
              }
              if (finding.replacement) {
                body += `  - Suggested: \`${finding.replacement}\`\n`;
              }
            }

            if ((report.findings || []).length > 20) {
              body += `\n_...and ${report.findings.length - 20} more findings. See the full drift-report artifact._\n`;
            }

            body += `\n---\n_This issue was auto-generated by the Drift Detection workflow._`;

            // Check for existing open drift issues to avoid duplicates
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'canon-drift',
              state: 'open',
            });

            if (existing.data.length > 0) {
              // Update existing issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: body,
              });
              console.log(`Updated existing drift issue #${existing.data[0].number}`);
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Canon Drift Detected: ${criticalCount} critical, ${warningCount} warnings`,
                body: body,
                labels: ['canon-drift', 'automated'],
              });
              console.log('Created new drift issue');
            }
