# DEPRECATED: This workflow references directories (canon/, templates/, src/, etc.)
# that exist in uiao-core, not uiao-docs. Disabled to prevent CI noise.
# Original trigger preserved in comments below.
name: CI

on:
  workflow_dispatch:  # Manual trigger only  see deprecation notice above

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          pip install -e .[dev]

      - name: Verify package import
        run: |
          python -c "from uiao_core import __version__; print(f'uiao-core v{__version__}')"

      - name: Lint with ruff
        run: |
          ruff check --fix src/

      - name: Type-check with mypy
        run: |
          mypy src/uiao_core/
        continue-on-error: true

      - name: Run tests
        run: |
          pytest tests/test_models.py tests/test_cli.py tests/test_workflow_serialization.py -v --tb=short

      - name: Install audit tools
        run: pip install pip-audit safety

      - name: Dependency vulnerability audit (pip-audit)
        continue-on-error: true
        run: >-
          pip-audit --format json --output pip-audit-report.json
          --ignore-vuln CVE-2024-6345
          --ignore-vuln PYSEC-2025-49

      - name: Dependency vulnerability audit (safety)
        run: safety check --json --output safety-report.json
        continue-on-error: true
      - name: Upload audit reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: dep-audit-py${{ matrix.python-version }}
          path: |
            pip-audit-report.json
            safety-report.json
          retention-days: 30

      - name: Generate SBOM
        if: matrix.python-version == '3.12'
        run: uiao generate-sbom --output sbom.cyclonedx.json

      - name: Upload SBOM
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
          retention-days: 90
