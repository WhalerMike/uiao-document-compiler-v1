name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608  # v4.1.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          pip install -e .[dev]

      - name: Verify package import
        run: |
          python -c "from uiao_core import __version__; print(f'uiao-core v{__version__}')"

      - name: Lint with ruff
        run: |
          ruff check src/

      - name: Type-check with mypy
        run: |
          mypy src/uiao_core/
        continue-on-error: true

      - name: Run tests
        run: |
          pytest tests/test_models.py tests/test_cli.py -v --tb=short

      - name: Install audit tools
        run: pip install pip-audit safety

      - name: Dependency vulnerability audit (pip-audit)
        run: >-
          pip-audit --format json --output pip-audit-report.json
          --ignore-vuln CVE-2024-6345
          --ignore-vuln PYSEC-2025-49

      - name: Dependency vulnerability audit (safety)
        run: safety check --json --output safety-report.json
        continue-on-error: true

      - name: Upload audit reports
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        if: always()
        with:
          name: dep-audit-py${{ matrix.python-version }}
          path: |
            pip-audit-report.json
            safety-report.json
          retention-days: 30

      - name: Generate SBOM
        if: matrix.python-version == '3.12'
        run: uiao generate-sbom --output sbom.cyclonedx.json

      - name: Upload SBOM
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
          retention-days: 90
