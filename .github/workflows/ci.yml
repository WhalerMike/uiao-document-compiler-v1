name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          pip install -e .[dev]

      - name: Verify package import
        run: |
          python -c "from uiao_core import __version__; print(f'uiao-core v{__version__}')"

      - name: Lint with ruff
        run: |
          ruff check src/
        
      - name: Type-check with mypy
        run: |
          mypy src/uiao_core/

      - name: Run tests
        run: |
          pytest tests/test_models.py tests/test_cli.py -v --tb=shortcom
