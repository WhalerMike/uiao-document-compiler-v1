name: Generate Pitch Artifacts

on:
  push:
    branches: [main]
    paths:
      - 'canon/uiao_pitch_deck_v1.0.yaml'
      - 'canon/uiao_project_plan_v1.0.yaml'
      - 'scripts/generate_pptx.py'
      - 'scripts/plan_to_csv.py'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608  # v4.1.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'

      - run: pip install python-pptx pyyaml

      - name: Generate PPTX
        run: python scripts/generate_pptx.py

      - name: Generate Planner CSV
        run: python scripts/plan_to_csv.py


      - name: Pull latest changes
        run: git pull --rebase origin main
      - name: Commit Artifacts
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9  # v7.1.0
        with:
          commit_message: 'docs: update PPTX and Planner CSV [skip ci]'
