# DEPRECATED: This workflow references directories (canon/, templates/, src/, etc.)
# that exist in uiao-core, not uiao-docs. Disabled to prevent CI noise.
# Original trigger preserved in comments below.
name: Generate Pitch Artifacts

on:
  workflow_dispatch:  # Manual trigger only — see deprecation notice above

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'

      - run: pip install python-pptx pyyaml

      - name: Generate PPTX
        run: python scripts/generate_pptx.py

      - name: Generate Planner CSV
        run: python scripts/plan_to_csv.py


      - name: Pull latest changes
        run: git pull --rebase origin main
      - name: Commit Artifacts
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9  # v7.1.0
        with:
          commit_message: 'docs: update PPTX and Planner CSV [skip ci]'
