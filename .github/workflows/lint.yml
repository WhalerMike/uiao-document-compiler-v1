# DEPRECATED: This workflow references directories (canon/, templates/, src/, etc.)
# that exist in uiao-core, not uiao-docs. Disabled to prevent CI noise.
# Original trigger preserved in comments below.
name: Lint

on:
  workflow_dispatch:  # Manual trigger only — see deprecation notice above

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'

      - name: Install linters
        run: pip install ruff mypy types-PyYAML

      - name: Ruff check
        run: ruff check --fix src/ tests/ scripts/

      - name: Ruff format (auto-fix)
        run: ruff format src/ tests/ scripts/

      - name: Commit formatting fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "style: auto-format with ruff"
          git push || true

      - name: Mypy (package only)
        continue-on-error: true
        run: mypy src/uiao_core --ignore-missing-imports
