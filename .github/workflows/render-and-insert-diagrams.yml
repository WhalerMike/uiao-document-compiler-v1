# DEPRECATED: This workflow references directories (canon/, templates/, src/, etc.)
# that exist in uiao-core, not uiao-docs. Disabled to prevent CI noise.
# Original trigger preserved in comments below.
# -----------------------------------------------------------------
# render-and-insert-diagrams.yml
# Renders Mermaid .mermaid files to PNG, renders diagrams.yml entries
# via mmdc, then inserts image references into canonical docs.
# ROUTING: Skips files tagged diagram-owner: gemini (see canon/DIAGRAM-STANDARDS.md)
# -----------------------------------------------------------------
name: Render & Insert Diagrams

on:
  workflow_dispatch:  # Manual trigger only — see deprecation notice above

jobs:
  render-and-insert:
    name: Render Mermaid -> PNG & Insert into Docs
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Mermaid CLI (mmdc)
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Install Playwright Chromium (required by mmdc)
        run: npx playwright install --with-deps chromium

      - name: Create Puppeteer no-sandbox config
        run: |
          echo '{"args":["--no-sandbox","--disable-setuid-sandbox"]}' > /tmp/puppeteer-config.json
          cat /tmp/puppeteer-config.json

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Render standalone .mermaid files to PNG
        run: |
          mkdir -p assets/images/mermaid
          for f in visuals/*.mermaid; do
            [ -f "$f" ] || continue
            base=$(basename "$f" .mermaid)
            echo "Rendering $f -> assets/images/mermaid/${base}.png"
            mmdc -i "$f" -o "assets/images/mermaid/${base}.png" \
              -p /tmp/puppeteer-config.json \
              -b transparent -w 2048 -H 1536 || echo "WARN: $f failed"
          done

      - name: Render diagrams from YAML catalogs
        run: |
          python3 - <<'PYEOF'
          import yaml, subprocess, os, sys
          from pathlib import Path

          OUT = Path("assets/images/mermaid")
          OUT.mkdir(parents=True, exist_ok=True)

          catalogs = [
              "data/diagrams.yml",
              "canon/diagrams.yaml",
          ]

          for cat in catalogs:
              p = Path(cat)
              if not p.exists():
                  print(f"Catalog not found, skipping: {cat}")
                  continue
              data = yaml.safe_load(p.read_text()) or {}
              diagrams = data.get("diagrams", data)
              for key, value in diagrams.items():
                  mmd_src = value if isinstance(value, str) else value.get("mermaid", value.get("source", ""))
                  if not mmd_src or not mmd_src.strip():
                      continue
                  tmp = Path(f"/tmp/{key}.mmd")
                  tmp.write_text(mmd_src)
                  out_png = OUT / f"{key}.png"
                  print(f"  Rendering YAML diagram: {key} -> {out_png}")
                  subprocess.run(
                      ["mmdc", "-i", str(tmp), "-o", str(out_png),
                       "-p", "/tmp/puppeteer-config.json",
                       "-b", "transparent", "-w", "2048", "-H", "1536"],
                      check=False,
                  )
          print("YAML diagram rendering complete.")
          PYEOF

      - name: Insert diagrams into Markdown docs (skip Gemini-owned files)
        run: |
          python3 - <<'PYEOF'
          import re, glob, os, yaml
          from pathlib import Path

          ASSETS = Path("assets/images/mermaid")
          VISUALS = Path("visuals")
          # Mermaid CLI owns docs/, templates/, canon/ -- but NOT src/templates/
          DOCS_DIRS = ["docs", "templates", "canon"]

          changes = 0
          skipped_gemini = 0
          available = {p.stem: p for p in ASSETS.glob("*.png")}

          visual_files = {}
          for ext in ("png", "svg", "jpg", "jpeg"):
              for p in VISUALS.glob(f"*.{ext}"):
                  visual_files[p.stem] = p
                  visual_files[p.name] = p

          def rel(src_file, target):
              return os.path.relpath(target, src_file.parent)

          def is_gemini_owned(md_path):
              """Check if file has diagram-owner: gemini in frontmatter."""
              try:
                  text = md_path.read_text(encoding="utf-8")
                  if text.startswith("---"):
                      end = text.find("---", 3)
                      if end > 0:
                          fm = yaml.safe_load(text[3:end])
                          if isinstance(fm, dict) and fm.get("diagram-owner") == "gemini":
                              return True
              except Exception:
                  pass
              # Folder-based fallback: src/templates/ is Gemini territory
              if str(md_path).startswith("src/templates/"):
                  return True
              return False

          for d in DOCS_DIRS:
              for md_path_str in glob.glob(f"{d}/**/*.md", recursive=True):
                  md = Path(md_path_str)
                  if is_gemini_owned(md):
                      skipped_gemini += 1
                      print(f"  SKIP (Gemini-owned): {md}")
                      continue

                  text = md.read_text(encoding="utf-8")
                  original = text

                  def replace_mermaid_block(m):
                      global changes
                      code = m.group(1).strip()
                      label = "UIAO Architecture Diagram"
                      img_rel = rel(md, ASSETS / "unified_arch.png")
                      for key, png in available.items():
                          if key in code or code[:80].lower().replace(" ","").find(key.lower().replace("_","")) >= 0:
                              img_rel = rel(md, png)
                              label = key.replace("_", " ").title()
                              break
                      changes += 1
                      return (
                          f"![{label}]({img_rel})\n\n"
                          f"<details>\n<summary>Mermaid source</summary>\n\n"
                          f"```mermaid\n{code}\n```\n\n"
                          f"</details>"
                      )

                  text = re.sub(
                      r"```mermaid\s*\n(.*?)\n```",
                      replace_mermaid_block,
                      text,
                      flags=re.DOTALL,
                  )

                  def replace_diagram_placeholder(m):
                      global changes
                      key = m.group(1).strip()
                      if key in available:
                          img_rel = rel(md, available[key])
                          changes += 1
                          return f"![{key.replace('_',' ').title()}]({img_rel})"
                      return m.group(0)

                  text = re.sub(
                      r"<!-- diagram:(\S+) -->",
                      replace_diagram_placeholder,
                      text,
                  )

                  def replace_visual_placeholder(m):
                      global changes
                      name = m.group(1).strip()
                      stem = Path(name).stem
                      target = visual_files.get(name) or visual_files.get(stem)
                      if target:
                          img_rel = rel(md, target)
                          changes += 1
                          return f"![{stem.replace('_',' ').title()}]({img_rel})"
                      return m.group(0)

                  text = re.sub(
                      r"<!-- visual:(\S+) -->",
                      replace_visual_placeholder,
                      text,
                  )

                  if text != original:
                      md.write_text(text, encoding="utf-8")
                      print(f"  Updated: {md}")

          print(f"\nDone. {changes} diagram insertion(s) across all docs.")
          print(f"Skipped {skipped_gemini} Gemini-owned file(s).")
          PYEOF

      - name: Commit rendered diagrams & updated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/images/mermaid/ docs/ templates/ canon/ visuals/ || true
          git diff --cached --quiet || git commit -m "chore: render diagrams and insert into docs [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break || sleep 5;
          done
