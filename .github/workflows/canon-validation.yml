# DEPRECATED: This workflow references directories (canon/, templates/, src/, etc.)
# that exist in uiao-core, not uiao-docs. Disabled to prevent CI noise.
# Original trigger preserved in comments below.
# <!-- NEW (Proposed) --> Canon Validation Workflow
# Ensures no renumbering, renaming, or relocation of canonical documents.
name: Canon Validation

on:
  workflow_dispatch:  # Manual trigger only — see deprecation notice above

jobs:
  validate-canon:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Validate canon numbering
        run: python scripts/validate_numbering.py

      - name: Validate canon structure
        run: python scripts/validate_canon.py

      - name: Validate directory layout
        run: python scripts/validate_directory.py
