name: Generate Artifacts

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'canon/**'
      - 'data/**'
      - 'templates/**'
      - 'visuals/**'
      - 'src/uiao_core/generators/**'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Mermaid CLI (mmdc)
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Install Python package
        run: pip install -e ".[dev,visuals]"

      - name: Generate artifacts
        run: uiao generate-artifacts --force-visuals
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Upload exports
        uses: actions/upload-artifact@v4
        with:
          name: uiao-exports
          path: exports/
