# DEPRECATED: This workflow references directories (canon/, templates/, src/, etc.)
# that exist in uiao-core, not uiao-docs. Disabled to prevent CI noise.
# Original trigger preserved in comments below.
name: Generate Artifacts

on:
  workflow_dispatch:  # Manual trigger only — see deprecation notice above

jobs:
  approve:
    name: Await Production Approval
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Approval granted
        run: echo "Deployment to production approved."

  generate:
    name: Generate and Upload Artifacts
    runs-on: ubuntu-latest
    needs: approve
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: '24'

      - name: Install PlantUML CLI (mmdc)
        run: npm install -g @plantuml-js/plantuml-cli

      - name: Install Python package
        run: pip install -e ".[dev,visuals]"

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Generate artifacts
        run: uiao generate-artifacts --force-visuals
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit generated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add exports/ docs/ visuals/ || true
          git diff --cached --quiet || git commit -m "chore: regenerate artifacts [skip ci]"
                  git pull --rebase origin main || true
          git push

      - name: Upload exports
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: uiao-exports
          path: exports/
