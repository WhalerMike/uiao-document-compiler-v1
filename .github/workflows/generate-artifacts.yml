name: Generate Artifacts

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'canon/**'
      - 'data/**'
      - 'templates/**'
      - 'visuals/**'
      - 'src/uiao_core/generators/**'

jobs:
  approve:
    name: Await Production Approval
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Approval granted
        run: echo "Deployment to production approved."

  generate:
    name: Generate and Upload Artifacts
    runs-on: ubuntu-latest
    needs: approve
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: '24'

      - name: Install Mermaid CLI (mmdc)
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Install Python package
        run: pip install -e ".[dev,visuals]"

      - name: Generate artifacts
        run: uiao generate-artifacts --force-visuals
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit generated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add exports/ docs/ visuals/ || true
          git diff --cached --quiet || git commit -m "chore: regenerate artifacts [skip ci]"
          git push

      - name: Upload exports
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: uiao-exports
          path: exports/
