name: Generate Artifacts

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'canon/**'
      - 'data/**'
      - 'templates/**'
      - 'visuals/**'
      - 'src/uiao_core/generators/**'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Mermaid CLI (mmdc)
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Install Python package
        run: pip install -e ".[dev,visuals]"

      - name: Generate artifacts
        run: uiao generate-artifacts --force-visuals

      - name: Commit generated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add exports/ docs/ visuals/ || true
          git diff --cached --quiet || git commit -m "chore: regenerate artifacts [skip ci]"
          git push

      - name: Upload exports
        uses: actions/upload-artifact@v4
        with:
          name: uiao-exports
          path: exports/
