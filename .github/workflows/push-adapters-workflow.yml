# ----------------------------------------------------------------
# Bootstrap Adapter Layer
# Creates the full UIAO adapter scaffold in one commit.
# Uses GITHUB_TOKEN - no PAT required.
# ----------------------------------------------------------------
name: Bootstrap Adapter Layer

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type CONFIRM to proceed'
        required: true
        default: ''

permissions:
  contents: write

jobs:
  scaffold:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'CONFIRM'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create adapter scaffold
        run: |
          mkdir -p adapters/database adapters/cloud adapters/government tests
          python3 << 'GENSCRIPT'
          import os, textwrap
          def w(path, content):
              os.makedirs(os.path.dirname(path) or '.', exist_ok=True)
              with open(path, 'w') as f:
                  f.write(textwrap.dedent(content).lstrip('\n'))

          w('adapters/__init__.py', '''
              """UIAO Adapter Registry - auto-discovery of all installed adapters."""
              from __future__ import annotations
              import importlib
              import pkgutil
              from typing import Dict, Type

              _REGISTRY: Dict[str, Type] = {}

              def register(adapter_id: str):
                  def decorator(cls):
                      _REGISTRY[adapter_id] = cls
                      return cls
                  return decorator

              def get_adapter(adapter_id: str):
                  return _REGISTRY[adapter_id]

              ADAPTER_REGISTRY = _REGISTRY

              for _loader, _name, _ispkg in pkgutil.walk_packages(
                  __path__, prefix=__name__ + "."
              ):
                  importlib.import_module(_name)
          ''')

          w('adapters/base_adapter.py', '''
              """BaseAdapter ABC - every adapter implements this contract."""
              from __future__ import annotations
              from abc import ABC, abstractmethod
              from dataclasses import dataclass, field
              from typing import Any, List

              @dataclass
              class AdapterMetadata:
                  adapter_id: str
                  name: str
                  version: str
                  certification_level: int = 1
                  plane: str = "Identity"
                  capabilities: List[str] = field(default_factory=list)

              @dataclass
              class CanonicalClaim:
                  claim_id: str
                  source_system: str
                  claim_type: str = ""
                  value: Any = None

              @dataclass
              class ClaimFilter:
                  source_system: str = ""
                  claim_type: str = ""

              @dataclass
              class DriftReport:
                  adapter_id: str
                  drifted: bool = False
                  details: str = ""

              @dataclass
              class KSIBundle:
                  bundle_id: str
                  adapter_id: str

              @dataclass
              class ProvenanceRecord:
                  record_id: str
                  adapter_id: str
                  source_system: str = ""

              class BaseAdapter(ABC):
                  @abstractmethod
                  async def connect(self, config: dict) -> bool: ...
                  @abstractmethod
                  async def extract_claims(self, filter: ClaimFilter) -> List[CanonicalClaim]: ...
                  @abstractmethod
                  async def detect_drift(self) -> DriftReport: ...
                  @abstractmethod
                  async def transform_to_canonical(self, raw: Any) -> CanonicalClaim: ...
                  @abstractmethod
                  async def generate_lineage(self) -> ProvenanceRecord: ...
                  @abstractmethod
                  async def generate_ksi_bundle(self) -> KSIBundle: ...
                  @abstractmethod
                  def get_metadata(self) -> AdapterMetadata: ...
          ''')

          w('adapters/database/__init__.py', '''
              """Database adapter sub-package."""
          ''')

          w('adapters/database/sql_adapter.py', '''
              """SqlAdapter - placeholder for direct SQL-based identity stores."""
              from __future__ import annotations
              from adapters import register
              from adapters.base_adapter import (
                  BaseAdapter, AdapterMetadata, CanonicalClaim, ClaimFilter,
                  DriftReport, KSIBundle, ProvenanceRecord,
              )
              from typing import Any, List

              @register("sql")
              class SqlAdapter(BaseAdapter):
                  """Reads identity claims from a SQL-compatible store."""
                  _connected: bool = False

                  async def connect(self, config: dict) -> bool:
                      self._conn_str = config.get("connection_string", "")
                      self._connected = bool(self._conn_str)
                      return self._connected

                  async def extract_claims(self, filter: ClaimFilter) -> List[CanonicalClaim]:
                      return []

                  async def detect_drift(self) -> DriftReport:
                      return DriftReport(adapter_id="sql")

                  async def transform_to_canonical(self, raw: Any) -> CanonicalClaim:
                      return CanonicalClaim(
                          claim_id="", source_system="sql",
                          claim_type="row", value=raw,
                      )

                  async def generate_lineage(self) -> ProvenanceRecord:
                      return ProvenanceRecord(
                          record_id="", adapter_id="sql",
                          source_system="SQL Store",
                      )

                  async def generate_ksi_bundle(self) -> KSIBundle:
                      return KSIBundle(bundle_id="", adapter_id="sql")

                  def get_metadata(self) -> AdapterMetadata:
                      return AdapterMetadata(
                          adapter_id="sql",
                          name="SQL Identity Store Adapter",
                          version="0.1.0",
                          certification_level=1,
                          plane="Data",
                          capabilities=["row_extraction", "schema_discovery"],
                      )
          ''')

          w('adapters/cloud/__init__.py', '''
              """Cloud adapter sub-package."""
          ''')

          w('adapters/cloud/entra_id.py', '''
              """EntraIdAdapter - Identity Plane adapter for Microsoft Entra ID."""
              from __future__ import annotations
              from adapters import register
              from adapters.base_adapter import (
                  BaseAdapter, AdapterMetadata, CanonicalClaim, ClaimFilter,
                  DriftReport, KSIBundle, ProvenanceRecord,
              )
              from typing import Any, List

              @register("entra-id")
              class EntraIdAdapter(BaseAdapter):
                  """Pulls identity claims from Microsoft Entra ID via MS Graph."""
                  _tenant_id: str = ""
                  _connected: bool = False

                  async def connect(self, config: dict) -> bool:
                      self._tenant_id = config.get("tenant_id", "")
                      self._connected = bool(self._tenant_id)
                      return self._connected

                  async def extract_claims(self, filter: ClaimFilter) -> List[CanonicalClaim]:
                      return []

                  async def detect_drift(self) -> DriftReport:
                      return DriftReport(adapter_id="entra-id")

                  async def transform_to_canonical(self, raw: Any) -> CanonicalClaim:
                      return CanonicalClaim(
                          claim_id="", source_system="entra-id",
                          claim_type="identity", value=raw,
                      )

                  async def generate_lineage(self) -> ProvenanceRecord:
                      return ProvenanceRecord(
                          record_id="", adapter_id="entra-id",
                          source_system="Microsoft Entra ID",
                      )

                  async def generate_ksi_bundle(self) -> KSIBundle:
                      return KSIBundle(bundle_id="", adapter_id="entra-id")

                  def get_metadata(self) -> AdapterMetadata:
                      return AdapterMetadata(
                          adapter_id="entra-id",
                          name="Microsoft Entra ID Adapter",
                          version="0.1.0",
                          certification_level=1,
                          plane="Identity",
                          capabilities=["user_sync", "group_sync", "conditional_access"],
                      )
          ''')

          w('adapters/cloud/intune.py', '''
              """IntuneAdapter - Management Plane adapter for Microsoft Intune."""
              from __future__ import annotations
              from adapters import register
              from adapters.base_adapter import (
                  BaseAdapter, AdapterMetadata, CanonicalClaim, ClaimFilter,
                  DriftReport, KSIBundle, ProvenanceRecord,
              )
              from typing import Any, List

              @register("intune")
              class IntuneAdapter(BaseAdapter):
                  """Pulls device-compliance and config claims from Intune."""
                  async def connect(self, config: dict) -> bool:
                      return True
                  async def extract_claims(self, filter: ClaimFilter) -> List[CanonicalClaim]:
                      return []
                  async def detect_drift(self) -> DriftReport:
                      return DriftReport(adapter_id="intune")
                  async def transform_to_canonical(self, raw: Any) -> CanonicalClaim:
                      return CanonicalClaim(claim_id="", source_system="intune", claim_type="device", value=raw)
                  async def generate_lineage(self) -> ProvenanceRecord:
                      return ProvenanceRecord(record_id="", adapter_id="intune", source_system="Microsoft Intune")
                  async def generate_ksi_bundle(self) -> KSIBundle:
                      return KSIBundle(bundle_id="", adapter_id="intune")
                  def get_metadata(self) -> AdapterMetadata:
                      return AdapterMetadata(
                          adapter_id="intune", name="Microsoft Intune Adapter",
                          version="0.1.0", certification_level=1, plane="Management",
                          capabilities=["device_compliance", "configuration_profiles", "app_inventory"],
                      )
          ''')

          w('adapters/cloud/m365.py', '''
              """M365Adapter - Telemetry Plane adapter synthesising M365 signals."""
              from __future__ import annotations
              from adapters import register
              from adapters.base_adapter import (
                  BaseAdapter, AdapterMetadata, CanonicalClaim, ClaimFilter,
                  DriftReport, KSIBundle, ProvenanceRecord,
              )
              from typing import Any, List

              @register("m365")
              class M365Adapter(BaseAdapter):
                  """Synthesises telemetry claims from M365 service health and usage."""
                  async def connect(self, config: dict) -> bool:
                      return True
                  async def extract_claims(self, filter: ClaimFilter) -> List[CanonicalClaim]:
                      return []
                  async def detect_drift(self) -> DriftReport:
                      return DriftReport(adapter_id="m365")
                  async def transform_to_canonical(self, raw: Any) -> CanonicalClaim:
                      return CanonicalClaim(claim_id="", source_system="m365", claim_type="telemetry", value=raw)
                  async def generate_lineage(self) -> ProvenanceRecord:
                      return ProvenanceRecord(record_id="", adapter_id="m365", source_system="Microsoft 365")
                  async def generate_ksi_bundle(self) -> KSIBundle:
                      return KSIBundle(bundle_id="", adapter_id="m365")
                  def get_metadata(self) -> AdapterMetadata:
                      return AdapterMetadata(
                          adapter_id="m365", name="Microsoft 365 Telemetry Adapter",
                          version="0.1.0", certification_level=1, plane="Telemetry",
                          capabilities=["service_health", "usage_reports", "network_telemetry"],
                      )
          ''')

          w('adapters/government/__init__.py', '''
              """Government adapter sub-package.

              Roadmap placeholders for federal Truth Source adapters:
                - SSA  (Social Security Administration)
                - IRS  (Internal Revenue Service)
                - CMS  (Centers for Medicare & Medicaid Services)
                - DHS/USCIS (Department of Homeland Security / USCIS)

              These adapters require inter-agency MOU and federated identity
              before implementation can proceed.  Each will inherit from
              adapters.base_adapter.BaseAdapter and follow the contract in
              docs/20_AdapterContract.md.
              """
          ''')

          w('tests/test_adapters.py', '''
              """Smoke tests for the adapter registry and base contracts."""
              import pytest
              import asyncio
              from adapters import ADAPTER_REGISTRY
              from adapters.base_adapter import BaseAdapter


              def test_registry_not_empty():
                  """At least one adapter must be registered."""
                  assert len(ADAPTER_REGISTRY) > 0, "Adapter registry is empty"


              def test_all_registered_are_base_adapter_subclasses():
                  """Every registered adapter must extend BaseAdapter."""
                  for name, cls in ADAPTER_REGISTRY.items():
                      assert issubclass(cls, BaseAdapter), f"{name} is not a BaseAdapter subclass"


              @pytest.mark.parametrize("adapter_id", list(ADAPTER_REGISTRY.keys()))
              def test_adapter_metadata(adapter_id):
                  """Each adapter must return valid metadata."""
                  cls = ADAPTER_REGISTRY[adapter_id]
                  instance = cls()
                  meta = instance.get_metadata()
                  assert meta.adapter_id == adapter_id
                  assert meta.version
                  assert meta.certification_level >= 1


              @pytest.mark.parametrize("adapter_id", list(ADAPTER_REGISTRY.keys()))
              def test_adapter_connect(adapter_id):
                  """Each adapter connect() must return bool."""
                  cls = ADAPTER_REGISTRY[adapter_id]
                  instance = cls()
                  result = asyncio.get_event_loop().run_until_complete(instance.connect({}))
                  assert isinstance(result, bool)
          ''')

          print("All 10 adapter files created.")
          GENSCRIPT

      - name: Commit adapter scaffold
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: bootstrap adapter layer - 10 scaffold files"
          git push
