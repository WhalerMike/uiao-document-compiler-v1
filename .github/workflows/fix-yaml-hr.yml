# One-shot fix: replace bare --- HR dividers near *Generated lines in all .qmd files
# These cause Quarto/Pandoc to parse a second YAML block and fail with "Unknown alias"
# After running, this workflow commits the fixes and then removes itself.

name: Fix YAML HR in QMD files (one-shot)

on:
  workflow_dispatch:

  permissions:
    contents: write

    jobs:
      fix-yaml-hr:
          runs-on: ubuntu-latest
              steps:
                    - name: Checkout repository
                            uses: actions/checkout@v4
                                    with:
                                              fetch-depth: 0

                                                    - name: Fix bare --- HR lines in all .qmd files
                                                            run: |
                                                                      python3 - << 'PYEOF'
                                                                                import os, re, glob

                                                                                          # Pattern: a line that is exactly "---" that appears in the document BODY
                                                                                                    # (after the closing frontmatter ---) and is followed eventually by a
                                                                                                              # *Generated by the UIAO-Core Pipeline* line.
                                                                                                                        # We replace standalone --- body dividers with "- - -" which Pandoc
                                                                                                                                  # treats as an HR but NOT as a YAML block start.
                                                                                                                                  
                                                                                                                                            fixed_files = []
                                                                                                                                                      for path in glob.glob("docs/**/*.qmd", recursive=True) + glob.glob("docs/*.qmd"):
                                                                                                                                                                    with open(path, "r", encoding="utf-8") as f:
                                                                                                                                                                                      content = f.read()
                                                                                                                                                                                      
                                                                                                                                                                                                    # Only touch files that have the *Generated marker
                                                                                                                                                                                                                  if "*Generated by the UIAO-Core Pipeline*" not in content:
                                                                                                                                                                                                                                    continue
                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                  # Find the end of the frontmatter (second ---)
                                                                                                                                                                                                                                                                lines = content.split("\n")
                                                                                                                                                                                                                                                                              fm_end = -1
                                                                                                                                                                                                                                                                                            if lines[0].strip() == "---":
                                                                                                                                                                                                                                                                                                              for i in range(1, len(lines)):
                                                                                                                                                                                                                                                                                                                                    if lines[i].strip() == "---":
                                                                                                                                                                                                                                                                                                                                                              fm_end = i
                                                                                                                                                                                                                                                                                                                                                                                        break
                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                      if fm_end == -1:
                                                                                                                                                                                                                                                                                                                                                                                                                        continue
                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                      # Replace standalone --- lines in the body (after frontmatter) with - - -
                                                                                                                                                                                                                                                                                                                                                                                                                                                    changed = False
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  for i in range(fm_end + 1, len(lines)):
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if lines[i].strip() == "---":
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          lines[i] = "- - -"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                changed = True
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              if changed:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                with open(path, "w", encoding="utf-8") as f:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      f.write("\n".join(lines))
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        fixed_files.append(path)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          print(f"Fixed: {path}")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    print(f"\nTotal fixed: {len(fixed_files)}")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              PYEOF
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - name: Configure git
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      git config user.name "github-actions[bot]"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                git config user.email "github-actions[bot]@users.noreply.github.com"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - name: Commit fixes
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        git add docs/
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  if git diff --staged --quiet; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              echo "No changes to commit"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    git commit -m "fix(quarto): replace bare --- HR dividers with - - - in all .qmd files to prevent YAML alias parse errors"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                git push
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - name: Remove this workflow file after running
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  git rm .github/workflows/fix-yaml-hr.yml
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            git commit -m "chore: remove one-shot fix-yaml-hr workflow after successful run"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      git push
