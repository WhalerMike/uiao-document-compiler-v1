name: Generate UIAO Documents

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'templates/**'
      - 'schemas/**'
      - 'scripts/**'
      - 'visuals/**'
      - 'canon/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install pandoc and LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex

      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli
        continue-on-error: true

      - name: Run Federal Compliance Safety Gate
        run: python scripts/validate_build_readiness.py

      - name: Generate documents from templates
        run: python scripts/generate_docs.py

      - name: Compile DOCX, PDF, and HTML exports
        run: python scripts/compile_documents.py

      - name: Export GRC Compliance Evidence
        run: python scripts/export_compliance_evidence.py

      - name: Generate OSCAL Component Definition
        run: python scripts/generate_oscal.py

      - name: Generate OSCAL POA&M with Gap Detection
        run: python scripts/generate_poam.py

      - name: Generate OSCAL SSP Skeleton
        run: python scripts/generate_ssp.py

      - name: Validate OSCAL Artifacts
        run: python scripts/validate_oscal.py

      - name: Validate with compliance-trestle
        run: python scripts/validate_with_trestle.py

      - name: Validate Continuous Monitoring Integration (dry-run)
        run: python scripts/update_poam_from_monitoring.py --dry-run

      - name: Build MkDocs site
        run: mkdocs build

      - name: Commit generated docs and exports
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/ site/ exports/
          git diff --cached --quiet || git commit -m "Auto-generate docs and exports"
          # Pull remote changes, auto-resolving all conflicts by keeping our generated files
          git pull origin main --no-rebase --strategy-option ours || (git checkout --ours . && git add -A)
          git push
