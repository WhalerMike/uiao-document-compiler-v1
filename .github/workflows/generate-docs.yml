name: Generate UIAO Documents

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'templates/**'
      - 'schemas/**'
      - 'scripts/**'
  workflow_dispatch:


env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          sudo apt-get update && sudo apt-get install -y pandoc

      - name: Validate schemas
        run: python scripts/validate_schemas.py

      - name: Normalize artifacts
        run: python scripts/normalize_artifacts.py

      - name: Compile documents
        run: python scripts/compile_documents.py

      - name: Upload exports as artifacts
        uses: actions/upload-artifact@v5
        with:
          name: udc-exports
          path: exports/
          retention-days: 90
        if: always()

      - name: Commit generated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/ exports/
          git diff --cached --quiet || git commit -m "Auto-generate docs from data [skip ci]"
          git pull --rebase origin main
          git push
