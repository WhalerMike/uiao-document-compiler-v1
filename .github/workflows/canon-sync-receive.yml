name: Canon sync — receive from uiao-core

# Triggered by `canon-updated` repository_dispatch from WhalerMike/uiao-core's
# canon-sync-dispatch.yml. Checks out uiao-core, runs sync_canon.py --scaffold,
# and opens a labeled pull request (`canon-sync`) with the propagated changes.
#
# Also accepts workflow_dispatch for manual re-runs (e.g., after a PAT rotation
# or to force-rebuild the tree from the current canon).
#
# See uiao-core/ARCHITECTURE.md §4 for the three-layer cross-repo sync model.
# This workflow is Layer 1 (real-time push) — the receiver half.
#
# REQUIRED SECRETS:
#   CANON_SYNC_DISPATCH_TOKEN  Fine-grained PAT (or classic PAT with `repo`
#                              scope) with Contents:read on
#                              WhalerMike/uiao-core. Same token is typically
#                              used for both dispatch and receive sides.
#                              See uiao-core/tools/README.md for setup.

on:
  repository_dispatch:
    types: [canon-updated]
  workflow_dispatch:
    inputs:
      core_ref:
        description: "Ref of uiao-core to sync from (default: main)"
        required: false
        default: main

concurrency:
  group: canon-sync-receive
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Run sync_canon.py and open PR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout uiao-docs
        uses: actions/checkout@v4

      - name: Checkout uiao-core (canon + tool)
        uses: actions/checkout@v4
        with:
          repository: WhalerMike/uiao-core
          ref: ${{ github.event.client_payload.source_sha || inputs.core_ref || 'main' }}
          path: .uiao-core-sync
          token: ${{ secrets.CANON_SYNC_DISPATCH_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install sync tool dependencies
        run: python3 -m pip install --quiet -r .uiao-core-sync/tools/requirements.txt

      - name: Run sync_canon.py --scaffold
        id: sync
        run: |
          python3 .uiao-core-sync/tools/sync_canon.py \
            --core-root .uiao-core-sync \
            --docs-root . \
            --scaffold --json > /tmp/sync-report.json
          set +e
          python3 .uiao-core-sync/tools/sync_canon.py \
            --core-root .uiao-core-sync \
            --docs-root . \
            --check-only
          exit_code=$?
          set -e
          echo "sync_exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          echo "::group::Sync report (JSON)"
          cat /tmp/sync-report.json
          echo "::endgroup::"

      - name: Upload sync report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sync-report-${{ github.event.client_payload.source_sha || github.run_id }}
          path: /tmp/sync-report.json
          retention-days: 30

      - name: Remove checked-out uiao-core before staging
        run: rm -rf .uiao-core-sync

      - name: Detect changes
        id: diff
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes produced by sync_canon.py — uiao-docs is already in sync."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git status --short
          fi

      - name: Build PR body
        if: steps.diff.outputs.has_changes == 'true'
        id: body
        run: |
          {
            echo "## Canon sync from uiao-core"
            echo ""
            echo "Auto-generated by \`.github/workflows/canon-sync-receive.yml\` from a \`canon-updated\` repository_dispatch event."
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Source repo   | \`${{ github.event.client_payload.source_repo || 'WhalerMike/uiao-core' }}\` |"
            echo "| Source SHA    | \`${{ github.event.client_payload.source_sha || inputs.core_ref || 'main' }}\` |"
            echo "| Source actor  | \`${{ github.event.client_payload.source_actor || github.actor }}\` |"
            echo "| Triggered at  | \`${{ github.event.client_payload.triggered_at || github.event.repository.updated_at }}\` |"
            echo "| Receiver run  | [\`${{ github.run_id }}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            echo ""
            echo "### Review notes"
            echo ""
            echo "- The YAML frontmatter on each scaffolded doc is **generated from canon** and must not be hand-edited. If you need to change those values, change them in \`uiao-core\` canon and let the sync re-propagate."
            echo "- The prose body under each scaffold (Overview, TODO sections) is **safe to author** — the sync tool preserves body content on subsequent runs."
            echo "- The full \`sync_canon.py\` JSON report is attached as a workflow artifact (\`sync-report-*\`)."
            echo ""
            echo "### Canon sync guarantees"
            echo ""
            echo "- Deterministic: same registries + tree produce identical output."
            echo "- Idempotent: re-running the tool on an already-synced tree produces no changes."
            echo "- Additive-only writes: the tool never deletes folders or files; orphan drift is reported for human review."
            echo ""
            echo "See \`uiao-core/ARCHITECTURE.md\` §4 for the three-layer sync contract and \`uiao-core/tools/README.md\` for the tool reference."
          } > /tmp/pr-body.md
          echo "body_path=/tmp/pr-body.md" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.diff.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.CANON_SYNC_DISPATCH_TOKEN }}
          branch: canon-sync/${{ github.event.client_payload.source_sha || github.run_id }}
          delete-branch: true
          title: "canon-sync: propagate uiao-core@${{ github.event.client_payload.source_sha && format('{0}', github.event.client_payload.source_sha) || format('manual-{0}', github.run_id) }}"
          body-path: /tmp/pr-body.md
          labels: |
            canon-sync
            automated
          commit-message: "[UIAO-DOCS] SYNC: propagate canon from uiao-core@${{ github.event.client_payload.source_sha || 'manual' }}"
          signoff: false
          sign-commits: false

      - name: Summary
        run: |
          {
            echo "## Canon sync complete"
            echo ""
            echo "- **Source SHA:** \`${{ github.event.client_payload.source_sha || inputs.core_ref || 'main' }}\`"
            echo "- **Changes detected:** \`${{ steps.diff.outputs.has_changes }}\`"
            echo "- **Sync tool exit code:** \`${{ steps.sync.outputs.sync_exit_code }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
