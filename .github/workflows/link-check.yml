name: Link Check

on:
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.qmd'
      - '.lychee.toml'
      - '.github/workflows/link-check.yml'
  schedule:
    # Mondays at 07:00 UTC — after Sunday's nightly build has had a chance
    # to render heavy formats. Weekly cadence is plenty for external link rot.
    - cron: '0 7 * * 1'
  workflow_dispatch:
    inputs:
      fail_on_broken:
        description: 'Fail the run if broken links found (default: report only)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read
  issues: write    # needed to create issue on scheduled runs

concurrency:
  group: link-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lychee:
    name: Check links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: lychee-cache-${{ github.run_id }}
          restore-keys: |
            lychee-cache-

      - name: Run lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --config .lychee.toml
            --cache
            --output ./lychee-report.md
            './**/*.md'
            './**/*.qmd'
          # fail on PRs (blocking); schedule + dispatch produce report only
          fail: ${{ github.event_name == 'pull_request' || github.event.inputs.fail_on_broken == 'true' }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lychee-report
          path: lychee-report.md
          retention-days: 30

      - name: Create issue on broken links (scheduled only)
        if: >-
          github.event_name == 'schedule'
          && steps.lychee.outputs.exit_code != '0'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Broken links detected — weekly sweep ${{ github.run_number }}"
          content-filepath: ./lychee-report.md
          labels: |
            link-rot
            maintenance
