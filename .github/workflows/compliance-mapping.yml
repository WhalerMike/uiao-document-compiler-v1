# <!-- NEW (Proposed) --> Compliance Mapping Workflow
# Regenerates or validates compliance mappings (FedRAMP, NIST, TIC 3.0, SCuBA).
name: Compliance Mapping

on:
  pull_request:
    paths:
      - 'data/crosswalk-index.yml'
      - 'docs/03_*'
      - 'docs/04_*'
      - 'docs/09_*'
  push:
    branches: [main]
    paths:
      - 'data/crosswalk-index.yml'
      - 'docs/03_*'
      - 'docs/04_*'
      - 'docs/09_*'

jobs:
  validate-compliance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Validate crosswalk mappings
        run: python scripts/update_crosswalks.py --validate-only
