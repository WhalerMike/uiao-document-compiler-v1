name: Rename Visual Assets

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rename:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Rename Gemini images to manifest names
        run: |
          cd visuals
          git mv Gemini_Generated_Image_9twzna9twzna9twz.png telemetry_fabric_mesh.png
          git mv Gemini_Generated_Image_9zm7g09zm7g09zm7.png cyberark_identity_vault.png
          git mv Gemini_Generated_Image_bifxlibifxlibifx.png kql_signal_correlation.png
          git mv Gemini_Generated_Image_iiu0hwiiu0hwiiu0.png identity_trust_lifecycle.png
          git mv Gemini_Generated_Image_xwqxz2xwqxz2xwqx.png atlas_vision_outcome.png
      - name: Commit renames
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Rename Gemini visuals to manifest filenames"
          git push
