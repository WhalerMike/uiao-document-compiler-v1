# <!-- NEW (Proposed) --> Crosswalk Regeneration Workflow
# Keeps Document 09 (Crosswalk Index) in sync with Documents 03 and 04.
name: Crosswalk Regeneration

on:
  push:
    branches: [main]
    paths:
      - 'docs/03_*'
      - 'docs/04_*'
  workflow_dispatch:

jobs:
  regenerate-crosswalk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Regenerate crosswalk index
        run: python scripts/update_crosswalks.py

      - name: Generate index
        run: python scripts/generate_index.py
