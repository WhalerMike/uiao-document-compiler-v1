name: UIAO Governance CLI Check

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  governance-cli:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci || npm install

      - name: Make CLI executable
        run: chmod +x tools/uiao-governance-cli.js

      - name: Run local drift inspection
        run: node tools/uiao-governance-cli.js
