name: AI Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run every Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  secret-scanning:
    name: Secret Scanning via TruffleHog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608  # v4.1.0
        with:
          fetch-depth: 0

      - name: Run TruffleHog secret scanning
        uses: trufflesecurity/trufflehog@6c64db94d5b2e09d7e0948fb6bd3166cc6fffbc7  # v3.94.0
        with:
          extra_args: --only-verified

  vulnerability-triage:
    name: AI-Powered Vulnerability Triage
    runs-on: ubuntu-latest
    needs: secret-scanning
    steps:
      - name: Checkout repository
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608  # v4.1.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run schema validation (compliance gate)
        run: python scripts/validate_schemas.py

      - name: Run build-readiness safety gate
        run: python scripts/validate_build_readiness.py

      - name: Validate OSCAL artifacts
        run: python scripts/validate_oscal.py

      - name: Upload security audit results
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: security-audit-results
          path: |
            exports/oscal/
          retention-days: 90
