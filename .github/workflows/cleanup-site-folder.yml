name: Cleanup site folder

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove site folder and push to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b chore/remove-site-folder
          git rm -rf site/
          git commit -m "chore: remove stale site/ build artifact folder"
          git push origin chore/remove-site-folder

      - name: Create Pull Request
        run: |
          gh pr create --title "chore: remove stale site/ build artifact" \
            --body "Removes the accidentally-committed stale MkDocs build artifact site/ folder. Quarto builds to GitHub Pages directly; this folder is not needed." \
            --base main \
            --head chore/remove-site-folder
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
