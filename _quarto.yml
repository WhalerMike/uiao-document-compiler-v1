format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: []
    toc: true
    toc-depth: 3
    number-sections: true
    code-fold: true
    code-tools: true
    df-print: default
    fig-cap-location: bottom
    fig-align: center

  docx:
    toc: true
    number-sections: true
    reference-doc: "data/docx-reference.docx"
    fig-cap-location: bottom

  pptx:
    reference-doc: "data/pptx-reference.pptx"
    fig-cap-location: bottom

execute:
  echo: true
  warning: false
  error: true
