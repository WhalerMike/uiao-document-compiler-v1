# UIAO Governance Canon - MkDocs Configuration
# Updated: April 2026 | Hierarchical Canon Structure
# Repository: https://github.com/WhalerMike/uiao-docs

site_name: UIAO Governance Canon
site_url: https://whalermike.github.io/uiao-docs/
site_description: >-
  Universal Integration Adapter Orchestration.
  Governance Canon, Appendices, and Architecture Decision Records.
  Commercial Cloud | FedRAMP Governed | Not FedRAMP High.
site_author: Michael Stratton

repo_name: WhalerMike/uiao-docs
repo_url: https://github.com/WhalerMike/uiao-docs

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: default
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.integrate

plugins:
  - search
  - tags

extra_css:
  - stylesheets/uiao.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - def_list

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/WhalerMike/uiao-docs
  generator: false

not_in_nav: |
  SCuBA-Maintainer-Onboarding.md
  SCuBA-Pipeline-Runbook.md
  contributing.md
  request-export.md
  documents/index.md
  diagrams/index.md
  diagrams/adapter-plane.md
  diagrams/drift-fabric.md
  diagrams/evidence-fabric.md
  diagrams/governance-hierarchy.md
  diagrams/governance-plane.md
  diagrams/truth-fabric.md
  onboarding/index.md
  onboarding/adapter-developer-guide.md

