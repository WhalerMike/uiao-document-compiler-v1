site_name: UIAO Documentation
site_url: https://WhalerMike.github.io/uiao-docs
repo_url: https://github.com/WhalerMike/uiao-docs
repo_name: WhalerMike/uiao-docs

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/download.js

nav:
  - Home: index.md
  - Documents:
    - Library: documents/index.md
  - Contributing: contributing.md
  - Request Export: request-export.md
