<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-labelledby="metaTitle metaDesc">
  <title id="metaTitle">UIAO Metadata Governance Map</title>
  <desc id="metaDesc">Diagram showing metadata flow from contributors to CI validators, JSON schema, dashboards, ADR index, governance footer, and drift detection.</desc>
  <rect width="100%" height="100%" fill="#ffffff"/>

  <!-- Row 1 -->
  <g transform="translate(50,40)">
    <rect x="0" y="0" width="280" height="80" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="140" y="38" font-family="Arial" font-size="16" fill="#0369a1" text-anchor="middle" font-weight="700">Contributors</text>
    <text x="140" y="60" font-family="Arial" font-size="12" fill="#0369a1" text-anchor="middle">Write frontmatter metadata</text>
  </g>
  <g transform="translate(460,40)">
    <rect x="0" y="0" width="280" height="80" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="140" y="38" font-family="Arial" font-size="16" fill="#854d0e" text-anchor="middle" font-weight="700">Frontmatter Metadata</text>
    <text x="140" y="60" font-family="Arial" font-size="12" fill="#854d0e" text-anchor="middle">Human-readable layer</text>
  </g>
  <g transform="translate(870,40)">
    <rect x="0" y="0" width="280" height="80" rx="8" fill="#f3e8ff" stroke="#7e22ce" stroke-width="2"/>
    <text x="140" y="38" font-family="Arial" font-size="16" fill="#6b21a8" text-anchor="middle" font-weight="700">JSON Schema</text>
    <text x="140" y="60" font-family="Arial" font-size="12" fill="#6b21a8" text-anchor="middle">Machine-readable layer</text>
  </g>

  <!-- Row 2 -->
  <g transform="translate(50,200)">
    <rect x="0" y="0" width="280" height="80" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="140" y="38" font-family="Arial" font-size="16" fill="#b91c1c" text-anchor="middle" font-weight="700">CI Validators</text>
    <text x="140" y="60" font-family="Arial" font-size="12" fill="#b91c1c" text-anchor="middle">Enforce metadata contract</text>
  </g>
  <g transform="translate(460,200)">
    <rect x="0" y="0" width="280" height="80" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="140" y="38" font-family="Arial" font-size="16" fill="#166534" text-anchor="middle" font-weight="700">Derived Metadata</text>
    <text x="140" y="60" font-family="Arial" font-size="12" fill="#166534" text-anchor="middle">Indexes and dashboards</text>
  </g>
  <g transform="translate(870,200)">
    <rect x="0" y="0" width="280" height="80" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <text x="140" y="38" font-family="Arial" font-size="16" fill="#15803d" text-anchor="middle" font-weight="700">Governance Footer</text>
    <text x="140" y="60" font-family="Arial" font-size="12" fill="#15803d" text-anchor="middle">Provenance display</text>
  </g>

  <!-- Row 3 -->
  <g transform="translate(460,360)">
    <rect x="0" y="0" width="280" height="80" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="140" y="38" font-family="Arial" font-size="16" fill="#c2410c" text-anchor="middle" font-weight="700">Drift Detection</text>
    <text x="140" y="60" font-family="Arial" font-size="12" fill="#c2410c" text-anchor="middle">Detects metadata inconsistencies</text>
  </g>

  <!-- Arrows -->
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <line x1="330" y1="80" x2="458" y2="80" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="740" y1="80" x2="868" y2="80" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="190" y1="120" x2="190" y2="198" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="600" y1="120" x2="600" y2="198" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="1010" y1="120" x2="1010" y2="198" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="600" y1="280" x2="600" y2="358" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
</svg>
