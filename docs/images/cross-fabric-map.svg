<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="cfTitle cfDesc">
  <title id="cfTitle">UIAO Cross Fabric Governance Map</title>
  <desc id="cfDesc">Diagram showing Canon Overview at top, five appendices (Adapter Model, Identity and Roles, Drift Fabric, Evidence Fabric, Governance Plane) arranged beneath, a Cross-Fabric Interaction Layer connecting them, ADR Registry below, and Corpus Status Dashboard and Contributor Workflows at the bottom. Clickable regions link to appendix landing pages.</desc>

  <rect width="100%" height="100%" fill="#ffffff"/>

  <!-- Canon Overview -->
  <a xlink:href="../canon/" aria-label="Open Canon Overview">
    <rect x="300" y="20" width="600" height="70" rx="8" fill="#0b5fff"/>
    <text x="600" y="62" font-family="Inter, Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="700">CANON OVERVIEW</text>
  </a>

  <!-- Appendix A -->
  <a xlink:href="../appendix/a-adapter-plane/" aria-label="Appendix A Adapter Model">
    <rect x="40" y="140" width="180" height="90" rx="6" fill="#f0f7ff" stroke="#0b5fff" stroke-width="2"/>
    <text x="130" y="180" font-family="Inter, Arial, sans-serif" font-size="13" fill="#0b5fff" text-anchor="middle" font-weight="700">Appendix A</text>
    <text x="130" y="200" font-family="Inter, Arial, sans-serif" font-size="11" fill="#0b5fff" text-anchor="middle">Adapter Model</text>
  </a>

  <!-- Appendix B -->
  <a xlink:href="../appendix/b-truth-fabric/" aria-label="Appendix B Truth Fabric">
    <rect x="260" y="140" width="180" height="90" rx="6" fill="#fff7f0" stroke="#ff7a00" stroke-width="2"/>
    <text x="350" y="180" font-family="Inter, Arial, sans-serif" font-size="13" fill="#ff7a00" text-anchor="middle" font-weight="700">Appendix B</text>
    <text x="350" y="200" font-family="Inter, Arial, sans-serif" font-size="11" fill="#ff7a00" text-anchor="middle">Truth Fabric</text>
  </a>

  <!-- Appendix C -->
  <a xlink:href="../appendix/c-drift-fabric/" aria-label="Appendix C Drift Fabric">
    <rect x="480" y="140" width="180" height="90" rx="6" fill="#f7fff0" stroke="#2e9e2e" stroke-width="2"/>
    <text x="570" y="180" font-family="Inter, Arial, sans-serif" font-size="13" fill="#2e9e2e" text-anchor="middle" font-weight="700">Appendix C</text>
    <text x="570" y="200" font-family="Inter, Arial, sans-serif" font-size="11" fill="#2e9e2e" text-anchor="middle">Drift Fabric</text>
  </a>

  <!-- Appendix D -->
  <a xlink:href="../appendix/d-evidence-fabric/" aria-label="Appendix D Evidence Fabric">
    <rect x="700" y="140" width="180" height="90" rx="6" fill="#fff7ff" stroke="#9b2eff" stroke-width="2"/>
    <text x="790" y="180" font-family="Inter, Arial, sans-serif" font-size="13" fill="#9b2eff" text-anchor="middle" font-weight="700">Appendix D</text>
    <text x="790" y="200" font-family="Inter, Arial, sans-serif" font-size="11" fill="#9b2eff" text-anchor="middle">Evidence Fabric</text>
  </a>

  <!-- Appendix E -->
  <a xlink:href="../appendix/e-governance-plane/" aria-label="Appendix E Governance Plane">
    <rect x="920" y="140" width="180" height="90" rx="6" fill="#f0fff7" stroke="#00a86b" stroke-width="2"/>
    <text x="1010" y="180" font-family="Inter, Arial, sans-serif" font-size="13" fill="#00a86b" text-anchor="middle" font-weight="700">Appendix E</text>
    <text x="1010" y="200" font-family="Inter, Arial, sans-serif" font-size="11" fill="#00a86b" text-anchor="middle">Governance Plane</text>
  </a>

  <!-- Cross-Fabric Interaction Layer -->
  <rect x="80" y="270" width="1000" height="100" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="580" y="310" font-family="Inter, Arial, sans-serif" font-size="16" fill="#334155" text-anchor="middle" font-weight="700">Cross-Fabric Interaction Layer</text>
  <text x="580" y="335" font-family="Inter, Arial, sans-serif" font-size="12" fill="#475569" text-anchor="middle">Data flows, responsibilities, and integration contracts</text>

  <!-- ADR Registry -->
  <a xlink:href="../adr/" aria-label="Open ADR Registry">
    <rect x="280" y="410" width="640" height="70" rx="8" fill="#fffaf0" stroke="#ffb020" stroke-width="1.5"/>
    <text x="600" y="448" font-family="Inter, Arial, sans-serif" font-size="16" fill="#92400e" text-anchor="middle" font-weight="700">ADR Registry</text>
    <text x="600" y="468" font-family="Inter, Arial, sans-serif" font-size="11" fill="#92400e" text-anchor="middle">Decision index with lifecycle states and cross-references</text>
  </a>

  <!-- Corpus Status Dashboard -->
  <a xlink:href="../canon/corpus-status-dashboard/" aria-label="Open Corpus Status Dashboard">
    <rect x="160" y="520" width="880" height="80" rx="8" fill="#f0fff7" stroke="#00a86b" stroke-width="1.5"/>
    <text x="600" y="558" font-family="Inter, Arial, sans-serif" font-size="16" fill="#065f46" text-anchor="middle" font-weight="700">Corpus Status Dashboard</text>
    <text x="600" y="578" font-family="Inter, Arial, sans-serif" font-size="11" fill="#065f46" text-anchor="middle">Single pane of truth for document maturity and owners</text>
  </a>

  <!-- Contributor Workflows -->
  <a xlink:href="../contributing/" aria-label="Open Contributor Guide">
    <rect x="320" y="640" width="560" height="70" rx="8" fill="#f7f7ff" stroke="#4c51bf" stroke-width="1.5"/>
    <text x="600" y="678" font-family="Inter, Arial, sans-serif" font-size="16" fill="#3730a3" text-anchor="middle" font-weight="700">Contributor Workflows</text>
    <text x="600" y="698" font-family="Inter, Arial, sans-serif" font-size="11" fill="#3730a3" text-anchor="middle">PR -> CI validation -> Merge -> Dashboard update</text>
  </a>

  <!-- Arrows -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Canon to appendices -->
  <line x1="600" y1="90" x2="600" y2="135" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Appendices to interaction layer -->
  <line x1="130" y1="230" x2="200" y2="268" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="350" y1="230" x2="370" y2="268" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="570" y1="230" x2="540" y2="268" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="790" y1="230" x2="720" y2="268" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="1010" y1="230" x2="970" y2="268" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Interaction to ADR -->
  <line x1="600" y1="370" x2="600" y2="408" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ADR to Dashboard -->
  <line x1="600" y1="480" x2="600" y2="518" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Dashboard to Contributor -->
  <line x1="600" y1="600" x2="600" y2="638" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

</svg>
